name: Deploy
on:
  push:
    branches: [main]
  # Weekly rebuild so AGSI+ (gas storage) auto-fetched data stays current
  # even when no code is pushed. Mondays 06:00 UTC.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      - run: npm install && npm run build
        env:
          VITE_EIA_API_KEY: ${{ secrets.VITE_EIA_API_KEY }}
          AGSI_API_KEY: ${{ secrets.AGSI_API_KEY }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/oilshock"
          strip_components: 1
          rm: true