<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oil Shock Simulator — 2026 Iran War Impact Analysis</title>
    <meta name="description" content="Monte Carlo simulation modeling the impact of the 2026 Iran war on oil prices, flights, food, and household costs across Europe and Denmark." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0f1a; color: #e2e8f0; }
      input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
      input[type="range"]::-webkit-slider-track { height: 6px; border-radius: 3px; background: #1e2d45; }
      input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; margin-top: -5px; }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #f59e0b;
        margin-top: -5px;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 3px;
        background: #1e2d45;
      }
      input[type="range"]::-moz-range-thumb {
        height: 16px;
        width: 16px;
        border-radius: 50%;
        background: #f59e0b;
        border: none;
        cursor: pointer;
      }
      input[type="range"]::-moz-range-track {
        height: 6px;
        border-radius: 3px;
        background: #1e2d45;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
